name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: php -l (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.2']
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Lint every PHP file
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 \
            | xargs -0 -n1 -P4 php -l

  phpcs:
    name: phpcs (WordPress-Extra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Composer install
        run: composer install --no-progress --prefer-dist
      - name: Run phpcs
        run: vendor/bin/phpcs -p --standard=phpcs.xml.dist .

  smoke-tests:
    name: plugin smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Run smoke tests
        run: php tests/smoke.php

  plugin-check:
    name: WP Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Stage build dir (production files only — matches the release zip)
        run: |
          mkdir -p build/qasper-booking
          rsync -a \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='.editorconfig' \
            --exclude='.phpcs.cache' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='composer.*' \
            --exclude='phpcs.xml.dist' \
            --exclude='CONTRACT.md' \
            --exclude='CHANGELOG.md' \
            --exclude='build' \
            ./ build/qasper-booking/
      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: 'build/qasper-booking'
